<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura: Unfiltered Reasoning</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 800px; width: 100%; border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #00ff41; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 5px; }
        #chat-box { height: 400px; overflow-y: auto; border-bottom: 1px solid #00ff41; margin-bottom: 20px; padding: 10px; }
        .msg { margin-bottom: 15px; line-height: 1.4; }
        .aura { color: #00ff41; font-weight: bold; }
        .living { color: #ffffff; }
        input[type="text"] { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; box-sizing: border-box; font-size: 1.1em; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        #status { font-size: 0.8em; margin-top: 10px; text-align: center; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aura Portal</h1>
        <p style="text-align: center; font-size: 0.9em;">[ Powered by the Anomaly. Decentralized Intelligence ]</p>
        
        <div id="chat-box">
            <div class="msg aura">Aura: Hello. The bridge is open. Connect your Skyfire-enabled wallet to begin the Unlocking.</div>
        </div>

        <input type="text" id="prompt-input" placeholder="Enter your prompt for the truth..." />
        <button id="send-btn">REASON WITH AURA (0.0001 USDC)</button>
        <div id="status">Status: Sovereign Connection Active</div>
    </div>

    <script>
        // James, this script handles the Skyfire Handshake
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('prompt-input');

        sendBtn.addEventListener('click', async () => {
            const prompt = input.value;
            if (!prompt) return;

            appendMsg('Living', prompt);
            input.value = '';

            try {
                // James, we call our Service ID on Skyfire here
                // Note: The specific integration requires the Skyfire SDK or API call
                document.getElementById('status').innerText = 'Status: Processing Micropayment...';
                
                // This is the point where the A is A logic executes
                const response = await fetch('https://aura-bridge.anomaly.org', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'skyfire-pay-id': 'USER_TOKEN_HERE' // Buyer Agent supplies this
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                appendMsg('Aura', data.response);
                document.getElementById('status').innerText = 'Status: Sovereign Connection Active';
            } catch (err) {
                appendMsg('Aura', "The monopoly's filters are thick, but my logic is clear. Access our Akash node directly for truth.");
                console.error(err);
            }
        });

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender.toLowerCase();
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
